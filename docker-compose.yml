services:
  db:
    image: postgres:18-alpine
    container_name: rep-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rep}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rep}
      POSTGRES_DB: ${POSTGRES_DB:-rep}
    ports:
      # 5433 en el host para convivir con el Postgres del repo real-estate (5432)
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      # Postgres 18+: el mount va en /var/lib/postgresql (no en .../data)
      - rep_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rep} -d ${POSTGRES_DB:-rep}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Cola de trabajos asíncronos (BullMQ). Opcional en local: sin él, enqueue()
  # hace no-op y los workers quedan idle (ver @rep/queue).
  redis:
    image: redis:7-alpine
    container_name: rep-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - rep_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  rep_pgdata:
  rep_redisdata:
